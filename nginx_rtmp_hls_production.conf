worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /usr/local/nginx/logs/nginx.pid;

events {
    worker_connections 1024;
}

rtmp {
    server {
        listen 1935;
        chunk_size 4096;
        notify_method get;

        application live {
            live on;
            on_publish http://127.0.0.1:8080/auth;

            hls on;
            hls_path /opt/data/hls;
            hls_fragment 3;
            hls_playlist_length 60;

            # AES-128 HLS keys written beside playlists and served under /hls/keys/.
            hls_keys on;
            hls_key_path /opt/data/hls/keys;
            hls_fragments_per_key 5;
            hls_key_url /hls/keys/;
        }
    }
}

http {
    sendfile off;
    tcp_nopush on;
    directio 512;
    default_type application/octet-stream;
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    map $arg_secret $publish_auth_ok {
        default 0;
        "${PUBLISH_SECRET}" 1;
    }

    server {
        listen 8080;

        # Prefer terminating TLS on a reverse proxy in front of this container.
        # See README "TLS / reverse proxy".

        location = /healthz {
            access_log off;
            add_header Content-Type text/plain;
            return 200 'ok';
        }

        location = /auth {
            if ($publish_auth_ok = 0) {
                return 403;
            }
            return 200;
        }

        location /hls/keys/ {
            alias /opt/data/hls/keys/;
            add_header Cache-Control no-store;
            add_header Access-Control-Allow-Origin '${CORS_ORIGIN}' always;
        }

        location /hls {
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            root /opt/data;
            add_header Cache-Control no-cache;
            add_header Access-Control-Allow-Origin '${CORS_ORIGIN}' always;
            add_header Access-Control-Expose-Headers Content-Length;
            add_header X-Content-Type-Options nosniff always;
            add_header X-Frame-Options DENY always;
            add_header Referrer-Policy no-referrer always;

            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin '${CORS_ORIGIN}';
                add_header Access-Control-Max-Age 1728000;
                add_header Content-Type 'text/plain; charset=utf-8';
                add_header Content-Length 0;
                return 204;
            }
        }

        location / {
            return 404;
        }
    }
}
