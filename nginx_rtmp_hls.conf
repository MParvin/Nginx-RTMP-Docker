worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /usr/local/nginx/logs/nginx.pid;

events {
    worker_connections 1024;
}

rtmp {
    server {
        listen 1935;
        chunk_size 4096;
        # Pass on_* callback args as query string so $arg_secret works in /auth.
        notify_method get;

        application live {
            live on;

            # Reject publish unless ?secret= matches PUBLISH_SECRET.
            on_publish http://127.0.0.1:8080/auth;

            hls on;
            hls_path /opt/data/hls;
            hls_fragment 5;
            hls_playlist_length 30;
            # Encryption off in the default image; see nginx_rtmp_hls_production.conf.
            hls_keys off;

            # Optional: restrict RTMP play to localhost (HLS remains the public path).
            #allow play 127.0.0.1;
            #deny play all;
        }
    }
}

http {
    sendfile off;
    tcp_nopush on;
    directio 512;
    default_type application/octet-stream;
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # PUBLISH_SECRET is substituted by docker-entrypoint.sh at container start.
    map $arg_secret $publish_auth_ok {
        default 0;
        "${PUBLISH_SECRET}" 1;
    }

    server {
        listen 8080;

        location = /healthz {
            access_log off;
            add_header Content-Type text/plain;
            return 200 'ok';
        }

        # Used by nginx-rtmp on_publish. Encoder URL must include ?secret=...
        location = /auth {
            if ($publish_auth_ok = 0) {
                return 403;
            }
            return 200;
        }

        location /hls {
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            root /opt/data;
            add_header Cache-Control no-cache;
            add_header Access-Control-Allow-Origin '${CORS_ORIGIN}' always;
            add_header Access-Control-Expose-Headers Content-Length;

            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin '${CORS_ORIGIN}';
                add_header Access-Control-Max-Age 1728000;
                add_header Content-Type 'text/plain; charset=utf-8';
                add_header Content-Length 0;
                return 204;
            }
        }

        location / {
            return 404;
        }
    }
}
